name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Se actualiza cada hora
  workflow_dispatch:
  push: {branches: ["master", "main"]}

# ⬇️ NUEVO: Permisos necesarios para el GITHUB_TOKEN
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # ⬇️ CAMBIADO: De GH_TOKEN a GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}
          user: jesuscastromtz
          template: classic
          base: header, community, repositories, metadata
          # Personalización estética (Acorde a tu banner)
          config_timezone: America/Mexico_City
          design_title_color: "#00FFFF" # Cian de tu banner
          theme: dark
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
